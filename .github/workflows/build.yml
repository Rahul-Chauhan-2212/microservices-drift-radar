name: Build Services

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [order-service, user-service, payment-service]

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 25
      uses: actions/setup-java@v3
      with:
        java-version: '25'
        distribution: 'temurin'

    - name: Build ${{ matrix.service }}
      working-directory: ./microservice-lab/${{ matrix.service }}
      run: |
        chmod +x mvnw
        ./mvnw clean package
