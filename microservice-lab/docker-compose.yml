version: '3.8'

services:

  order-service:
    build: ./order-service
    ports:
      - "8081:8080"
    depends_on:
      - user-service
      - payment-service

  user-service:
    build: ./user-service
    ports:
      - "8082:8080"

  payment-service:
    build: ./payment-service
    ports:
      - "8083:8080"

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

volumes:
  prometheus_data: